name: Waka Readme

on:
  workflow_dispatch: # Manual trigger
  schedule:
    # Run 4 times/day at 00:00, 06:00, 12:00, 18:00 IST
    # IST = UTC+05:30, so UTC times are: 18:30, 00:30, 06:30, 12:30
    - cron: '30 18,0,6,12 * * *'

jobs:
  update-readme:
    name: WakaReadme DevMetrics
    runs-on: ubuntu-latest
    env:
      # Helps many tools render local time; the action will still use your format below
      TZ: Asia/Kolkata
    steps:
      - uses: anmol098/waka-readme-stats@master
        with:
            WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
            GH_TOKEN: ${{ secrets.GH_TOKEN }}

            # Display options
            SHOW_PROJECTS: "False"
            SHOW_DAYS_OF_WEEK: "False"
            SHOW_LANGUAGE_PER_REPO: "False"   # fixed typo
            SHOW_LOC_CHART: "False"
            SHOW_SHORT_INFO: "False"
            SHOW_PROFILE_VIEWS: "False"
            SHOW_LANGUAGE: "True"
            SHOW_OS: "False"
            SHOW_LINES_OF_CODE: "False"
            SHOW_TOTAL_CODE_TIME: "False"
            SHOW_EDITORS: "False"

            # India date & time format (DD-MM-YYYY, 12-hr clock with AM/PM)
            UPDATED_DATE_FORMAT: "%d-%m-%Y %I:%M:%S %p IST"

            # Debugging
            DEBUG_LOGGING: "True"
